name: eBay Message Auto-Reply

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create ebay_config.py from secrets
        run: python create_config.py
        env:
          TSUJOU_TOKEN: ${{ secrets.TSUJOU_TOKEN }}
          SENMON_TOKEN: ${{ secrets.SENMON_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
          DEV_ID: ${{ secrets.DEV_ID }}
          CERT_ID: ${{ secrets.CERT_ID }}
      - name: Run auto-reply (both accounts)
        run: python ebay_message_responder.py
        env:
          TSUJOU_TOKEN: ${{ secrets.TSUJOU_TOKEN }}
          SENMON_TOKEN: ${{ secrets.SENMON_TOKEN }}
          APP_ID: ${{ secrets.APP_ID }}
          DEV_ID: ${{ secrets.DEV_ID }}
          CERT_ID: ${{ secrets.CERT_ID }}
